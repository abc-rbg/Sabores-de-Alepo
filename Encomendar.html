<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Encomendar - Sabores de Alepo</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="brand"><div class="logo">SA</div><div><div class="site-title">Sabores de Alepo</div></div></div>
      <nav class="nav">
        <a href="index.html">Início</a>
        <a href="Doces e sobremesas.html">Doces</a>
        <a href="Ingredientes e os componentes.html">Ingredientes</a>
      </nav>
    </header>

    <main>
      <article class="article">
        <h2>Encomendar</h2>
        <p>Preencha o formulário para encomendas ou pedidos especiais.</p>

        <form action="#" method="post" class="card" style="display:grid;gap:12px">
          <label>Nome
            <input class="input" type="text" name="nome" required>
          </label>
          <label>Contacto (telefone ou email)
            <input class="input" type="text" name="contacto" required>
          </label>
          <label>Produto / Pedido
            <textarea class="input" name="pedido" rows="4" required></textarea>
          </label>
          <div class="form-row">
            <label>Data desejada
              <input class="input" type="date" name="data">
            </label>
            <label>Quantidade
              <input class="input" type="number" name="quantidade" min="1" value="1">
            </label>
          </div>
          <button class="button" type="submit">Enviar encomenda</button>
        </form>
      </article>
    </main>

    <footer class="footer">© Sabores de Alepo</footer>
  </div>
</body>
</html>
